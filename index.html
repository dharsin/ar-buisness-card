<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR Corporate Card</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <div class="ui-overlay">Scan Business Card to View Profile</div>

  <a-scene mindar-image="imageTargetSrc: ./tracker1.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-assets>
      <a-asset-item id="avatar" src="https://models.readyplayer.me/64f1b5b4e3e3e3e3e3e3e3e3.glb"></a-asset-item>
      <img id="techGrid" src="https://i.imgur.com/your-tech-icons-grid.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse;" raycaster="objects: .clickable;"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-image src="#techGrid" position="0 0.4 0" width="0.7" height="0.4"></a-image>

      <a-entity gltf-model="#avatar" scale="0.3 0.3 0.3" position="0.3 0 0"></a-entity>

      <a-entity position="0 -0.5 0">
        <a-plane class="clickable" width="0.22" height="0.08" color="#2c7be5" position="-0.24 0 0">
          <a-text value="COMPANY" align="center" width="1" position="0 0 0.01"></a-text>
        </a-plane>
        <a-plane class="clickable" width="0.22" height="0.08" color="#2c7be5" position="0 0 0">
          <a-text value="VERTICALS" align="center" width="1" position="0 0 0.01"></a-text>
        </a-plane>
        <a-plane class="clickable" width="0.22" height="0.08" color="#2c7be5" position="0.24 0 0">
          <a-text value="CONTACTS" align="center" width="1" position="0 0 0.01"></a-text>
        </a-plane>
      </a-entity>

    </a-entity>
  </a-scene>
</body>
</html>
