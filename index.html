<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Premium AR Business Card</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    AFRAME.registerComponent('url-opener', {
      schema: { link: { type: 'string' } },
      init: function () {
        const targetUrl = this.data.link;
        this.el.addEventListener('click', function (evt) {
          evt.stopPropagation();
          window.open(targetUrl, '_blank');
        });
      }
    });
  </script>

  <style>
    body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: ./tracker1.mind; uiLoading:yes; uiScanning:yes;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="profilePic" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&h=200&q=80">
      <img id="videoMock" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?auto=format&fit=crop&w=400&h=250&q=80">
      <img id="iconChat" src="https://i.imgur.com/h9xHbyS.png">
      <img id="iconPhone" src="https://i.imgur.com/0H7ySgU.png">
      <img id="iconTwit" src="https://i.imgur.com/HtwG0h0.png">
      <img id="iconMail" src="https://i.imgur.com/7gK6D6M.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
              raycaster="objects: .clickable;">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-circle src="#profilePic" position="-0.35 0.25 0.01" radius="0.12" shader="flat"></a-circle>
      <a-text value="Matt Watson" align="left" width="2.0" color="#FFFFFF" position="-0.15 0.25 0.01"></a-text>

      <a-plane class="clickable" url-opener="link: https://www.youtube.com/" src="#videoMock"
               position="0 -0.1 0.01" width="0.7" height="0.4" shader="flat">
      </a-plane>

      <a-entity position="0 -0.4 0.02">
        <a-circle class="clickable" url-opener="link: https://instagram.com/" radius="0.07" position="-0.24 0 0" src="#iconChat" shader="flat"></a-circle>
        <a-circle class="clickable" url-opener="link: https://youtube.com/" radius="0.07" position="-0.08 0 0" src="#iconMail" shader="flat"></a-circle>
        <a-circle class="clickable" url-opener="link: https://x.com/" radius="0.07" position="0.08 0 0" src="#iconTwit" shader="flat"></a-circle>
        <a-circle class="clickable" url-opener="link: https://linkedin.com/" radius="0.07" position="0.24 0 0" src="#iconPhone" shader="flat"></a-circle>
      </a-entity>

    </a-entity>
  </a-scene>
</body>
</html>
