<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Premium AR Business Card</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    AFRAME.registerComponent('url-opener', {
      schema: { link: { type: 'string' } },
      init: function () {
        const url = this.data.link;
        this.el.addEventListener('click', () => window.open(url, '_blank'));
      }
    });
  </script>

  <style>
    body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: ./tracker1.mind; uiLoading:yes; uiScanning:yes;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="profilePic" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200">
      <img id="videoMock" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=400">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse;" raycaster="objects: .clickable;"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-circle src="#profilePic" position="0 0.25 0.01" radius="0.10" shader="flat"></a-circle>
      <a-text value="Matt Watson" align="center" width="1.2" color="#FFFFFF" position="0 0.12 0.01"></a-text>

      <a-plane class="clickable" url-opener="link: https://youtube.com/" src="#videoMock"
               position="0 -0.12 0.01" width="0.55" height="0.32" 
               material="transparent: true; opacity: 0.9; shader: flat;"></a-plane>

      <a-entity position="0 -0.42 0.02">
        <a-circle class="clickable" url-opener="link: https://instagram.com/" position="-0.18 0 0" radius="0.06" color="#00d4ff"></a-circle>
        <a-circle class="clickable" url-opener="link: https://youtube.com/" position="-0.06 0 0" radius="0.06" color="#00d4ff"></a-circle>
        <a-circle class="clickable" url-opener="link: https://x.com/" position="0.06 0 0" radius="0.06" color="#00d4ff"></a-circle>
        <a-circle class="clickable" url-opener="link: https://linkedin.com/" position="0.18 0 0" radius="0.06" color="#00d4ff"></a-circle>
      </a-entity>

    </a-entity>
  </a-scene>
</body>
</html>
