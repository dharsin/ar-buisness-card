<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Premium Split AR Business Card</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    // Component to handle website redirects
    AFRAME.registerComponent('url-opener', {
      schema: { link: { type: 'string' } },
      init: function () {
        const targetUrl = this.data.link;
        this.el.addEventListener('click', function (evt) {
          evt.stopPropagation();
          const newWindow = window.open(targetUrl, '_blank');
          if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
            window.location.href = targetUrl;
          }
        });
      }
    });

    // Component to force video playback on interaction
    AFRAME.registerComponent('video-controller', {
      init: function () {
        const video = document.querySelector('#bgVideo');
        this.el.addEventListener('click', () => {
          if (video.paused) {
            video.play().then(() => {
              console.log("Video playback started successfully.");
            }).catch(e => {
              console.error("Playback failed:", e);
            });
          }
        });
      }
    });
  </script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene
    video-controller
    mindar-image="imageTargetSrc: ./tracker1.mind; filterMinCF:0.001; filterBeta:0.01; uiLoading:yes; uiScanning:yes;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="bgVideo" 
             src="./assets/bg1.mp4" 
             loop="true" 
             crossorigin="anonymous" 
             playsinline 
             muted 
             autoplay>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
      raycaster="objects: .clickable; far: 10000; interval: 100;">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-video class="clickable" 
               url-opener="link: https://www.youtube.com/" 
               src="#bgVideo" 
               position="0 0 0" 
               width="1.13" 
               height="0.63">
      </a-video>

      <a-circle class="clickable" url-opener="link: https://www.instagram.com/" position="-0.4 -0.45 0.01"
        radius="0.08" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTY-0y1vWRxqeWnurh214AIqYiQ08C9GjjTV9OBOg_BDw&s=10"
        material="transparent: true; shader: flat;">
      </a-circle>

      <a-circle class="clickable" url-opener="link: https://www.youtube.com/" position="-0.15 -0.45 0.01" radius="0.08"
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLI0w79q7V2E-_V3RnVdlcvKPLZATQYCiWRJOMTHvRQw&s=10"
        material="transparent: true; shader: flat;">
      </a-circle>

      <a-circle class="clickable" url-opener="link: https://x.com/" position="0.10 -0.45 0.01" radius="0.08"
        src="https://static.vecteezy.com/system/resources/previews/016/716/467/non_2x/twitter-icon-free-png.png"
        material="transparent: true; shader: flat;">
      </a-circle>

      <a-circle class="clickable" url-opener="link: https://brand.linkedin.com/linkedin-logo" position="0.35 -0.45 0.01"
        radius="0.08" src="https://cdn-icons-png.flaticon.com/512/4096/4096186.png"
        material="transparent: true; shader: flat;">
      </a-circle>

    </a-entity>
  </a-scene>
</body>
</html>
