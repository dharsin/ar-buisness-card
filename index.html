<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Premium AR Business Card</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    AFRAME.registerComponent('url-opener', {
      schema: { link: {type: 'string'} },
      init: function () {
        this.el.addEventListener('click', (evt) => {
          evt.stopPropagation();
          const win = window.open(this.data.link, '_blank');
          if (!win) window.location.href = this.data.link;
        });
      }
    });
  </script>
</head>

<body>
  <a-scene 
    mindar-image="imageTargetSrc: ./tracker1.mind; uiLoading:yes; uiScanning:yes;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="iconMail" src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
      <img id="iconPhone" src="https://cdn-icons-png.flaticon.com/512/455/455705.png">
      <img id="iconWeb" src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png">
      <img id="videoMock" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?auto=format&fit=crop&w=400&h=250&q=80">
      <a-asset-item id="model1" src="./assets/model1.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse; fuse: false;" raycaster="objects: .clickable;"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-entity position="-0.7 0 0">
        <a-image class="clickable" src="#iconMail" url-opener="link: mailto:your@email.com" position="0 0.3 0.02" width="0.12" height="0.12"></a-image>
        <a-image class="clickable" src="#iconPhone" url-opener="link: tel:+123456789" position="0 0.1 0.02" width="0.12" height="0.12"></a-image>
        <a-image class="clickable" src="#iconWeb" url-opener="link: https://google.com" position="0 -0.1 0.02" width="0.12" height="0.12"></a-image>
      </a-entity>

      <a-entity gltf-model="#model1" position="0 0.6 0" scale="0.4 0.4 0.4"></a-entity>

      <a-plane position="0 -0.8 0.01" width="1.3" height="0.7" material="color: #000; opacity: 0.6; transparent: true"></a-plane>
      <a-plane 
        class="clickable"
        url-opener="link: https://your-portfolio.com"
        src="#videoMock" 
        position="0 -0.8 0.02" 
        width="1.2" 
        height="0.6" 
        shader="flat">
      </a-plane>

    </a-entity>
  </a-scene>
</body>
</html>
