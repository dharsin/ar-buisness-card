<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR Video Business Card</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./tracker1.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video id="myVideo" loop="true" src="./assets/bg.mp4" crossorigin="anonymous" playsinline muted="true" autoplay="true"></video>
    </a-assets>
    
    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane class="clickable" 
               src="#myVideo" 
               position="0 0 0" 
               width="0.99" height="0.6" 
               play-on-click
               material="shader: flat; src: #myVideo;">
      </a-plane>
    
      <a-text value="Tap to play video" align="center" position="0 -0.4 0" width="1"></a-text>
    </a-entity>
  </a-scene>

  <script>
    // Component to handle playback interaction
    AFRAME.registerComponent('play-on-click', {
      init: function () {
        this.el.addEventListener('click', () => {
          const video = document.querySelector('#myVideo');
          if (video.paused) {
            video.play();
          } else {
            video.pause();
          }
        });
      }
    });
  </script>
</body>
</html>
