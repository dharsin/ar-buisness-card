<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR Business Card</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #scanning-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(18, 20, 22, 0.9); z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; font-family: sans-serif; font-size: 18px; text-align: center;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="scanning-overlay">
    <h2>Initializing AR Scanner...</h2>
    <p>Please point your camera at the physical business card once loaded.</p>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="linkedinIcon" src="https://cdn-icons-png.flaticon.com/512/174/174857.png" crossorigin="anonymous">
      <img id="webIcon" src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-camera>

    <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
      
      <a-plane color="#16191d" opacity="0.9" position="0 0 0" height="0.9" width="1.5" rotation="0 0 0" material="roughness: 0.4"></a-plane>

      <a-text value="Dharsin S N" color="#ffffff" align="center" position="0 0.22 0.02" width="4"></a-text>
      <a-text value="Full Stack Developer" color="#00df9a" align="center" position="0 0.05 0.02" width="2.8"></a-text>

      <a-image 
        src="#linkedinIcon" 
        position="-0.3 -0.22 0.03" 
        scale="0.18 0.18 0.18" 
        class="clickable"
        url-handler="url: https://linkedin.com/in/yourprofile">
      </a-image>

      <a-image 
        src="#webIcon" 
        position="0.3 -0.22 0.03" 
        scale="0.18 0.18 0.18" 
        class="clickable"
        url-handler="url: https://www.thoughtflows.in/">
      </a-image>

    </a-entity>
  </a-scene>

  <script src="./app.js"></script>
</body>
</html>
